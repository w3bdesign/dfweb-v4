name: Cypress Tests
on: [push]

permissions:
  contents: read

jobs:
  cypress-run:
    runs-on: ubuntu-24.04
    timeout-minutes: 30   
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox, edge]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install pnpm
        uses: pnpm/action-setup@2e223e0f0d2b8fd9872cbadb8b7428e5f8b5556d

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Cache Cypress binary
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/Cypress
          key: ${{ runner.os }}-cypress-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Verify and install Cypress binary
        # Uses cypress@15.14.1 from lockfile (specified in package.json)
        run: pnpm exec cypress verify || pnpm exec cypress install

      - name: Cypress run
        # NOSONAR - install: false prevents package installation, no scripts can run
        uses: cypress-io/github-action@c495c3ddffba403ba11be95fffb67e25203b3799 # v7.1.10
        env:
          npm_config_ignore_scripts: true
        with:
          install: false
          build: pnpm build
          start: pnpm dev
          wait-on: "http://localhost:3000"
          wait-on-timeout: 120
          browser: ${{ matrix.browser }}
